<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyan Dream Creations</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #05080f;
    }

    .splash {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .splash img {
      width: 100%;
      max-width: 1200px;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="splash">
    <img
      src="assets/images/CyanDreamCreations.png"
      alt="Cyan Dream Creations — Dreamy Goods for Cozy Rituals and Everyday Magic"
    >
  </div>
</body>
</html>
